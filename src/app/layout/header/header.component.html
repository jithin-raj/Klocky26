<header class="header">

  <!-- LEFT: Hamburger (mobile) + Brand -->
  <div class="left">
    <button class="hamburger" (click)="toggleSidebar.emit()" aria-label="Toggle menu">
      <svg width="20" height="16" viewBox="0 0 20 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 1.5 Q10 4 20 1.5"   stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        <line x1="0" y1="8" x2="20" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M0 14.5 Q10 12 20 14.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
    <app-brand [size]="'sm'" [orgName]="orgName" [orgLogoUrl]="orgLogoUrl" [orgAccentColor]="orgAccentColor" [showAppBranding]="false" [clickable]="true" (brandClick)="navigateToDashboard()"></app-brand>
  </div>

  <!-- CENTER: Search -->
  <div class="search-wrap">
    <icon-search [size]="15" color="#94a3b8"></icon-search>
    <input type="text" placeholder="Search..." />
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- PUNCH IN / OUT icon button -->
    <div class="punch-wrap">
      <button
        class="punch-btn"
        [class.punched-in]="isClockedIn()"
        [class.locating]="geoStatus() === 'locating'"
        (click)="toggleClock()"
        [attr.aria-label]="isClockedIn() ? 'Clock Out' : 'Clock In'"
        [title]="isClockedIn() ? 'Clocked in - Click to clock out' : 'Clock In (uses your location)'"
      >
        <!-- Pulse ring when punched in -->
        @if (isClockedIn()) {
          <span class="punch-pulse"></span>
        }
        <!-- Locating spinner -->
        @if (geoStatus() === 'locating') {
          <span class="punch-spin"></span>
        }

        <!-- Stopwatch + Play = Clock In -->
        @if (!isClockedIn() && geoStatus() !== 'locating') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 2h4"/>
            <path d="M12 2v2.5"/>
            <circle cx="12" cy="13" r="8"/>
            <polygon points="10.5 10.5 16 13 10.5 15.5"
                     fill="currentColor" stroke="none"/>
          </svg>
        }

        <!-- Stopwatch + Stop square = Clock Out -->
        @if (isClockedIn()) {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 2h4"/>
            <path d="M12 2v2.5"/>
            <circle cx="12" cy="13" r="8"/>
            <rect x="9.5" y="10.5" width="5" height="5" rx="0.8"
                  fill="currentColor" stroke="none"/>
          </svg>
        }
      </button>
      <div class="punch-tip-wrap">
        <span class="punch-tip">{{ isClockedIn() ? 'Clock Out' : 'Clock In' }}</span>
        @if (isClockedIn() && geoStatus() === 'watching') {
          <span class="punch-geo">geo-tracked</span>
        }
      </div>
    </div>

    <div class="v-sep"></div>

    <!-- BELL -->
    <button class="icon-btn" title="Notifications">
      <icon-bell [size]="20" color="#6b7280"></icon-bell>
      <span class="notif-dot"></span>
    </button>

    <!-- USER AVATAR placeholder -->

  </div>

  <!-- Geo toast -->
  @if (geoToast()) {
    <div class="geo-toast">{{ geoToast() }}</div>
  }

  <!-- Geo confirmation panel -->
  @if (geoConfirmPending()) {
    <div class="geo-confirm-overlay" (click)="cancelGeoClockIn()">
      <div class="geo-confirm-panel" (click)="$event.stopPropagation()">
        <div class="geo-confirm-icon">📍</div>
        <div class="geo-confirm-body">
          <p class="geo-confirm-title">Clock In from this location?</p>
          <p class="geo-confirm-sub">Auto clock-out if you move more than 10m or after 5 minutes.</p>
        </div>
        <div class="geo-confirm-actions">
          <button class="geo-cancel-btn" (click)="cancelGeoClockIn()">Cancel</button>
          <button class="geo-confirm-btn" (click)="confirmGeoClockIn()">Confirm</button>
        </div>
      </div>
    </div>
  }

</header>
