<div class="layout" [style.--accent]="orgAccentColor || '#0d9488'">
  <!-- Mobile backdrop -->
  <div class="mobile-backdrop" [class.visible]="isSidebarOpen" (click)="closeSidebar()"></div>

  <klocky-sidebar [isOpen]="isSidebarOpen" [orgName]="orgName()" [orgLogoUrl]="orgLogoUrl" [orgLogoFallbackUrl]="orgLogoFallbackUrl" [orgAccentColor]="orgAccentColor"></klocky-sidebar>

  <div class="main">
    <klocky-header (toggleSidebar)="toggleSidebar()" [orgName]="orgName()" [orgLogoUrl]="orgLogoUrl" [orgLogoFallbackUrl]="orgLogoFallbackUrl" [orgAccentColor]="orgAccentColor"></klocky-header>

    <div class="content" #contentEl>
      <klocky-trial-banner></klocky-trial-banner>
      @if (routeLoading()) {
        <div class="page-loader">
          <ui-loader variant="klocky" [size]="72"></ui-loader>
        </div>
      }
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- Mobile bottom navigation — only rendered/visible on ≤768px -->
  <klocky-bottom-nav class="mobile-bottom-nav"></klocky-bottom-nav>
</div>

<!-- Global overlays — ui-toast-container lives at the app root (app.component.html) so toasts work outside the authenticated shell too -->
<ui-modal-outlet></ui-modal-outlet>
