<div class="layout" [style.--accent]="orgAccentColor || '#0d9488'">
  <!-- Mobile backdrop -->
  <div class="mobile-backdrop" [class.visible]="isSidebarOpen" (click)="closeSidebar()"></div>

  <klocky-sidebar [isOpen]="isSidebarOpen" [orgName]="orgName()" [orgLogoUrl]="orgLogoUrl" [orgAccentColor]="orgAccentColor"></klocky-sidebar>

  <div class="main">
    <klocky-header (toggleSidebar)="toggleSidebar()" [orgName]="orgName()" [orgLogoUrl]="orgLogoUrl" [orgAccentColor]="orgAccentColor"></klocky-header>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<!-- Global overlays — ui-toast-container lives at the app root (app.component.html) so toasts work outside the authenticated shell too -->
<ui-modal-outlet></ui-modal-outlet>
