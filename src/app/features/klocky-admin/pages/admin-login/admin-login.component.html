<div class="al-page">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="al-card">

    <!-- Brand -->
    <div class="al-brand">
      <div class="al-logo">
        <img src="/klock-logo.png" alt="Klockk" width="40" height="40" />
      </div>
      <span class="al-brand-name">klock <span class="al-badge">Team</span></span>
    </div>

    <h1 class="al-heading">KLOCK Admin</h1>
    <p class="al-subtext">Internal access only — Klockk team members</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate autocomplete="off">

      <!-- Email -->
      <div class="al-field">
        <label class="al-label" for="al-email">Email</label>
        <div class="al-input-wrap" [class.al-error]="isInvalid('email')">
          <svg class="al-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input id="al-email" class="al-input" type="email" autocomplete="email"
                 placeholder="team@klocky.app" formControlName="email" />
        </div>
        @if (isInvalid('email')) { <p class="al-error-msg">Enter a valid email.</p> }
      </div>

      <!-- Password -->
      <div class="al-field">
        <label class="al-label" for="al-password">Password</label>
        <div class="al-input-wrap" [class.al-error]="isInvalid('password')">
          <svg class="al-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input id="al-password" class="al-input"
                 [type]="showPw() ? 'text' : 'password'"
                 placeholder="••••••••" formControlName="password"
                 spellcheck="false" autocapitalize="off" autocorrect="off"
                 data-lpignore="true" data-1p-ignore data-bwignore="true" />
          <button class="al-eye" type="button" tabindex="-1"
                  (click)="showPw.set(!showPw())" aria-label="Show password">
            @if (showPw()) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
        @if (isInvalid('password')) { <p class="al-error-msg">Password is required.</p> }
      </div>

      @if (loginError()) {
        <div class="al-login-error">{{ loginError() }}</div>
      }

      <button class="al-btn" type="submit" [disabled]="submitting()">
        @if (submitting()) {
          <span class="al-spinner"></span> Signing in…
        } @else {
          Sign in to Admin Panel
        }
      </button>

    </form>

    <div class="al-back">
      <a routerLink="/" class="al-back-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to home
      </a>
    </div>

  </div>
</div>
